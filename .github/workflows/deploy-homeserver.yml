name: Deploy Bite Web to Home Server

on:
  workflow_run:
    workflows: ["Bite Web CI"]
    branches: ["prod", "dev"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check deploy secrets
        id: deploy_guard
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ] || [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Determine deploy target
        id: target
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || 'prod' }}"
          if [ "$BRANCH" = "dev" ]; then
            echo "service=bite-web-dev" >> "$GITHUB_OUTPUT"
          else
            echo "service=bite-web" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via webhook
        if: steps.deploy_guard.outputs.enabled == 'true'
        run: |
          RESPONSE=$(curl -sf -X POST \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}/deploy?service=${{ steps.target.outputs.service }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || exit 1
